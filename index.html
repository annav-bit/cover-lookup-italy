let activeLabel='';
function badge(l){const c=LC[l]||'#555';return '<span class="badge" style="background:'+c+'">'+l+'</span>';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(s,q){if(!q)return esc(s);const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(s).replace(re,'<mark style="background:rgba(29,185,84,.3);border-radius:2px">$1</mark>');}
function setLabel(l){activeLabel=l;document.querySelectorAll('.chip').forEach(c=>{c.classList.remove('on');c.style.background='';c.style.borderColor='';});const id=l?'chip-'+l.replace(/ /g,'-'):'chip-all';const el=document.getElementById(id);if(el){el.classList.add('on');if(l){el.style.background=LC[l]||'#555';el.style.borderColor=LC[l]||'#555';}}go();}
function go(){const q=document.getElementById('q').value.trim().toLowerCase();const tbody=document.getElementById('tbody');const countEl=document.getElementById('count');const res=DB.filter(d=>{const lm=!activeLabel||d.l.split(', ').includes(activeLabel);const qm=!q||d.a.toLowerCase().includes(q);return lm&&qm;});countEl.textContent=res.length+' risultat'+(res.length===1?'o':'i')+' su '+DB.length;if(res.length===0){tbody.innerHTML='<tr><td colspan="3"><div class="empty">🤷 Nessun risultato</div></td></tr>';return;}tbody.innerHTML=res.map(d=>{const labels=d.l.split(', ').map(badge).join('');const multi=d.l!==d.al?'<span class="tag-multi">↔ anche '+esc(d.al)+'</span>':'';return '<tr><td><strong>'+hl(d.a,q)+'</strong>'+multi+'</td><td>'+labels+'</td><td class="muted">'+esc(d.s)+'</td></tr>';}).join('');}
document.getElementById('q').addEventListener('input',go);
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
go();
